<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Musti Command Center</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#09090b; --panel:#18181b; --panel2:#27272a; --line:#27272a;
    --txt:#f4f4f5; --muted:#a1a1aa; --faint:#52525b;
    --accent:#60a5fa; --green:#34d399; --orange:#fbbf24; --purple:#a78bfa;
    --red:#f87171; --pink:#f0abfc; --lime:#a3e635; --teal:#2dd4bf;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.55 "Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
  .app{display:flex;min-height:100vh}
  /* Sidebar */
  .sidebar{width:236px;background:var(--panel);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--lime),var(--teal));display:grid;place-items:center;font-size:18px}
  .brand b{font-size:15px}.brand small{display:block;color:var(--muted);font-size:11px}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
  .nav button{all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--muted);font-weight:500}
  .nav button:hover{background:var(--panel2);color:var(--txt)}
  .nav button.active{background:var(--panel2);color:var(--txt)}
  .nav button.active{box-shadow:inset 2px 0 0 var(--lime)}
  .nav button.active .dot{background:var(--lime)}
  .nav .dot{width:7px;height:7px;border-radius:50%;background:#3a414c}
  .spacer{flex:1}
  .user{display:flex;align-items:center;gap:10px;padding:10px 8px;border-top:1px solid var(--line);color:var(--muted)}
  .user .av{width:30px;height:30px;border-radius:50%;background:var(--panel2);display:grid;place-items:center;color:var(--txt)}
  /* Main */
  .main{flex:1;padding:26px 30px;max-width:1280px}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .head h1{font-size:18px;margin:0;letter-spacing:.4px}
  .head .sub{color:var(--muted);font-size:12px;margin-left:10px}
  .live{display:inline-flex;align-items:center;gap:7px;color:var(--lime);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .live .pulse{width:8px;height:8px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 0 rgba(163,230,53,.5);animation:p 2s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(163,230,53,.5)}70%{box-shadow:0 0 0 8px rgba(163,230,53,0)}100%{box-shadow:0 0 0 0 rgba(163,230,53,0)}}
  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .kpi .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
  .kpi .val{font-size:24px;font-weight:700;margin-top:8px}
  .kpi .hint{color:var(--muted);font-size:11px;margin-top:4px}
  .cols{grid-template-columns:1fr 1fr}
  @media(max-width:900px){.cols{grid-template-columns:1fr}.sidebar{width:64px}.brand b,.brand small,.nav button span,.user .meta{display:none}}
  h3.sec{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:600;margin:0 0 12px}
  .kpi .label{color:var(--faint)!important}
  .head h1{font-weight:700;font-size:15px;letter-spacing:.02em}
  .card{border-radius:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .tag{display:inline-block;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:2px 9px;font-size:11px;margin:2px 3px 0 0}
  .pill{font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:3px 8px;border-radius:6px;font-weight:700}
  .pill.business{background:rgba(110,168,254,.15);color:var(--accent)}
  .pill.friend{background:rgba(67,211,158,.15);color:var(--green)}
  .pill.employee{background:rgba(255,180,84,.15);color:var(--orange)}
  .pill.investor,.pill.mentor{background:rgba(182,146,255,.15);color:var(--purple)}
  .list li{margin:6px 0;color:var(--txt)}
  .muted{color:var(--muted)}
  .empty{color:var(--muted);text-align:center;padding:60px 20px;border:1px dashed var(--line);border-radius:14px}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  canvas{max-height:260px}
  a{color:var(--accent)}
  .mdh1{font-size:20px;margin:0 0 4px}
  code{background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px}
  .card p{margin:6px 0}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">🎵</div><div><b>Musti</b><small>Command Center</small></div></div>
    <nav class="nav" id="nav">
      <button data-tab="who" class="active"><span class="dot"></span><span>Who You Are</span></button>
      <button data-tab="drip"><span class="dot"></span><span>DRIP · Weekly</span></button>
      <button data-tab="portfolio"><span class="dot"></span><span>Portfolio</span></button>
      <button data-tab="networking"><span class="dot"></span><span>Networking</span></button>
      <button data-tab="knowledge"><span class="dot"></span><span>Knowledge</span></button>
      <button data-tab="settings"><span class="dot"></span><span>Settings</span></button>
    </nav>
    <div class="spacer"></div>
    <div class="user"><div class="av">D</div><div class="meta"><b>Dave</b><small class="muted">Owner</small></div>
      <button onclick="logout()" title="Keluar" style="all:unset;cursor:pointer;margin-left:auto;color:var(--muted);font-size:12px;padding:6px 8px;border-radius:7px">⎋ Keluar</button>
    </div>
  </aside>

  <main class="main">
    <div class="head">
      <div><h1 id="title">WHO YOU ARE</h1><span class="sub" id="subtitle">self profile</span></div>
      <span class="live"><span class="pulse"></span> data live</span>
    </div>
    <div id="view"></div>
  </main>
</div>

<script>
const fmt = new Intl.NumberFormat('id-ID');
const money = (n,cur='IDR') => (cur==='IDR' ? 'Rp' : cur+' ') + fmt.format(Math.round(n));
const SIGN = t => /WITHDRAW|TRANSFER_OUT|SELL|FEE/i.test(t||'') ? -1 : 1;

const DATA = {};
async function load(name){ try{ const r=await fetch(`../data/${name}.json`); return await r.json(); }catch(e){ return null; } }
async function loadText(file){ try{ const r=await fetch(`../data/${file}`); return await r.text(); }catch(e){ return ''; } }

// minimal markdown -> HTML (headings, lists, bold, paragraphs); strips frontmatter
function mdToHtml(md){
  md = (md||'').replace(/^---[\s\S]*?---\s*/,'');
  const lines = md.split('\n'); let html=''; let inList=false;
  const close=()=>{ if(inList){html+='</ul>';inList=false;} };
  for(let raw of lines){
    const l=raw.trimEnd();
    const b = s => s.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/_(.+?)_/g,'<i>$1</i>');
    if(/^#\s/.test(l)){close();html+=`<h2 class="mdh1">${b(l.slice(2))}</h2>`;}
    else if(/^##\s/.test(l)){close();html+=`<h3 class="sec" style="margin-top:18px">${b(l.slice(3))}</h3>`;}
    else if(/^[-*]\s/.test(l)){ if(!inList){html+='<ul class="list">';inList=true;} const item=b(l.replace(/^[-*]\s/,'')); if(item.trim())html+=`<li>${item}</li>`; }
    else if(l.trim()===''){close();}
    else {close();html+=`<p>${b(l)}</p>`;}
  }
  close(); return html;
}

async function boot(){
  [DATA.profileMd, DATA.portfolio, DATA.expenses, DATA.networking, DATA.drip] = await Promise.all(
    [loadText('profile.md'), load('portfolio'), load('expenses'), load('networking'), load('drip')]);
  render('who');
}

function logout(){
  try{ var x=new XMLHttpRequest(); x.open('GET', location.origin+'/?logout='+Date.now(), false, 'logout', 'x'+Date.now()); x.send(); }catch(e){}
  location.replace('/');
}

const TITLES = {
  who:['WHO YOU ARE','self profile'], drip:['DRIP MATRIX','review weekly · how I spend my time'],
  portfolio:['PORTFOLIO','investments · spending'],
  networking:['NETWORKING','relationships'], knowledge:['KNOWLEDGE','from the brain'], settings:['SETTINGS','']
};
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); render(b.dataset.tab);
});
function render(tab){
  document.getElementById('title').textContent=TITLES[tab][0];
  document.getElementById('subtitle').textContent=TITLES[tab][1];
  document.getElementById('view').innerHTML = '';
  ({who:viewWho, drip:viewDrip, portfolio:viewPortfolio, networking:viewNetworking, knowledge:viewKnowledge, settings:viewSettings}[tab])();
}
const el = h => { const d=document.createElement('div'); d.innerHTML=h.trim(); return d.firstChild; };
const V = () => document.getElementById('view');

/* ---------- WHO YOU ARE (rendered from brain markdown) ---------- */
function viewWho(){
  const html = mdToHtml(DATA.profileMd);
  V().append(el(`<div class="card">${html||'<p class="muted">who-i-am.md is empty.</p>'}
    <div class="hint muted" style="margin-top:18px;border-top:1px solid var(--line);padding-top:12px">
      Source: <code>vault/profiles/who-i-am.md</code> in the brain repo — edit there, it syncs here.</div>
  </div>`));
}

/* ---------- DRIP MATRIX (weekly review) ---------- */
function viewDrip(){
  const d = DATA.drip||{}; const q = d.quadrants||{};
  const last = localStorage.getItem('dripReviewed')||'';
  const quad=(key,color)=>{ const x=q[key]||{}; return `<div class="card" style="border-color:${color}33">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <h3 class="sec" style="color:${color};margin:0">${x.label||key}</h3></div>
    <div class="hint muted" style="margin:4px 0 10px">${x.hint||''}</div>
    <ul class="list">${(x.items||[]).map(i=>`<li>${i}</li>`).join('')||'<li class="muted">— (empty)</li>'}</ul>
  </div>`; };
  // weekly review banner
  V().append(el(`<div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;border-color:#a3e63533">
    <div><b style="color:var(--lime)">Weekly DRIP review</b>
      <div class="hint muted">${last?('Last reviewed: '+last):'Not reviewed yet this week.'} — move tasks between quadrants as your work changes.</div></div>
    <button onclick="localStorage.setItem('dripReviewed', new Date().toISOString().slice(0,10)); render('drip')"
      style="all:unset;cursor:pointer;background:var(--lime);color:#0d0d0d;font-weight:700;padding:9px 16px;border-radius:9px;font-size:13px">✓ Mark reviewed</button>
  </div>`));
  // axis hint
  V().append(el(`<div class="hint muted" style="margin-bottom:8px">↑ makes money &nbsp;·&nbsp; → lights you up</div>`));
  // 2x2 grid: top-left Replacement, top-right Production / bottom-left Delegation, bottom-right Investment
  V().append(el(`<div class="grid cols">
    ${quad('replacement','#fbbf24')} ${quad('production','#a3e635')}
    ${quad('delegation','#f87171')} ${quad('investment','#60a5fa')}
  </div>`));
  // energy + rhythm
  const r = d.rhythm||{};
  V().append(el(`<div class="grid cols" style="margin-top:14px">
    <div class="card"><h3 class="sec">⚡ Energizes / 🪫 Drains</h3>
      <div class="muted" style="font-size:12px;margin-bottom:4px">Energizes</div>
      <div class="chip-row">${(d.energizes||[]).map(x=>`<span class="tag" style="border-color:#a3e63555;color:var(--lime)">${x}</span>`).join('')}</div>
      <div class="muted" style="font-size:12px;margin:12px 0 4px">Drains</div>
      <div class="chip-row">${(d.drains||[]).map(x=>`<span class="tag" style="border-color:#f8717155;color:var(--red)">${x}</span>`).join('')}</div>
    </div>
    <div class="card"><h3 class="sec">⏰ Productivity rhythm</h3>
      <p><b style="color:var(--lime)">Peak:</b> ${r.peak||''}</p>
      <p><b style="color:var(--orange)">Trough:</b> ${r.trough||''}</p>
      <div class="hint muted" style="margin-top:10px">Full log lives in the brain: <code>vault/profiles/energy-patterns.md</code></div>
    </div>
  </div>`));
}

/* ---------- PORTFOLIO (your exact original app, embedded) ---------- */
function viewPortfolio(){
  V().append(el(`<iframe src="./portfolio_legacy.html"
    style="width:100%;height:calc(100vh - 130px);border:1px solid var(--line);border-radius:14px;background:#fff"
    title="Portfolio"></iframe>`));
}

/* ---------- NETWORKING ---------- */
function viewNetworking(){
  const cs=(DATA.networking&&DATA.networking.contacts)||[];
  const groups={};
  cs.forEach(c=>{(groups[c.relationship||'other']=groups[c.relationship||'other']||[]).push(c)});
  if(!cs.length){ V().append(el('<div class="empty">No contacts yet. Add them in <b>networking.json</b> (or the Sheet later).</div>')); return; }
  Object.entries(groups).forEach(([rel,arr])=>{
    V().append(el(`<div class="card" style="margin-bottom:14px">
      <h3 class="sec">${rel} · ${arr.length}</h3>
      <table><thead><tr><th>Name</th><th>Company / Role</th><th>Context</th><th>Tags</th></tr></thead><tbody>
      ${arr.map(c=>`<tr>
        <td><b>${c.name||''}</b> <span class="pill ${rel}">${rel}</span></td>
        <td>${[c.company,c.role].filter(Boolean).join(' · ')||'<span class=muted>—</span>'}</td>
        <td class="muted">${c.context||''}</td>
        <td>${(c.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</td>
      </tr>`).join('')}
      </tbody></table></div>`));
  });
}

/* ---------- KNOWLEDGE ---------- */
function viewKnowledge(){
  V().append(el(`<div class="card">
    <h3 class="sec">Knowledge — from the Brain</h3>
    <p>This tab will outline your <b>PersonalBrain</b> (gbrain) — notes, profiles, and precedents — read-only.</p>
    <div class="chip-row">
      <span class="tag">profiles/how-dave-writes</span>
      <span class="tag">precedents (1,589)</span>
      <span class="tag">inbox notes</span>
    </div>
    <p class="muted" style="margin-top:14px">Next: wire this to the gbrain API on the VPS (search + outline), or render the brain repo's file tree.</p>
  </div>`));
}

/* ---------- SETTINGS ---------- */
function viewSettings(){
  V().append(el('<div class="empty">Settings — coming soon.</div>'));
}

boot();
</script>
</body>
</html>
