<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Musti Command Center</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23a3e635'/%3E%3Ctext x='50' y='52' font-size='56' text-anchor='middle' dominant-baseline='central'%3E%F0%9F%8E%B5%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#09090b; --panel:#18181b; --panel2:#27272a; --line:#27272a;
    --txt:#f4f4f5; --muted:#a1a1aa; --faint:#52525b;
    --accent:#60a5fa; --green:#34d399; --orange:#fbbf24; --purple:#a78bfa;
    --red:#f87171; --pink:#f0abfc; --lime:#a3e635; --teal:#2dd4bf;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.55 "Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
  .app{display:flex;min-height:100vh}
  /* Sidebar */
  .sidebar{width:236px;background:var(--panel);border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--lime),var(--teal));display:grid;place-items:center;font-size:18px}
  .brand b{font-size:15px}.brand small{display:block;color:var(--muted);font-size:11px}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
  .nav button{all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--muted);font-weight:500}
  .nav button:hover{background:var(--panel2);color:var(--txt)}
  .nav button.active{background:var(--panel2);color:var(--txt)}
  .nav button.active{box-shadow:inset 2px 0 0 var(--lime)}
  .nav button.active .dot{background:var(--lime)}
  .nav .dot{width:7px;height:7px;border-radius:50%;background:#3a414c}
  .spacer{flex:1}
  .user{display:flex;align-items:center;gap:10px;padding:10px 8px;border-top:1px solid var(--line);color:var(--muted)}
  .user .av{width:30px;height:30px;border-radius:50%;background:var(--panel2);display:grid;place-items:center;color:var(--txt)}
  /* Main */
  .main{flex:1;padding:26px 30px;max-width:1280px}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .head h1{font-size:18px;margin:0;letter-spacing:.4px}
  .head .sub{color:var(--muted);font-size:12px;margin-left:10px}
  .live{display:inline-flex;align-items:center;gap:7px;color:var(--lime);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .live .pulse{width:8px;height:8px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 0 rgba(163,230,53,.5);animation:p 2s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(163,230,53,.5)}70%{box-shadow:0 0 0 8px rgba(163,230,53,0)}100%{box-shadow:0 0 0 0 rgba(163,230,53,0)}}
  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .kpi .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px}
  .kpi .val{font-size:24px;font-weight:700;margin-top:8px}
  .kpi .hint{color:var(--muted);font-size:11px;margin-top:4px}
  .cols{grid-template-columns:1fr 1fr}
  @media(max-width:900px){.cols{grid-template-columns:1fr}.sidebar{width:64px}.brand b,.brand small,.nav button span,.user .meta{display:none}}
  h3.sec{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:600;margin:0 0 12px}
  .kpi .label{color:var(--faint)!important}
  .head h1{font-weight:700;font-size:15px;letter-spacing:.02em}
  .card{border-radius:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .tag{display:inline-block;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:2px 9px;font-size:11px;margin:2px 3px 0 0}
  .pill{font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:3px 8px;border-radius:6px;font-weight:700}
  .pill.business{background:rgba(110,168,254,.15);color:var(--accent)}
  .pill.friend{background:rgba(67,211,158,.15);color:var(--green)}
  .pill.employee{background:rgba(255,180,84,.15);color:var(--orange)}
  .pill.investor,.pill.mentor{background:rgba(182,146,255,.15);color:var(--purple)}
  .list li{margin:6px 0;color:var(--txt)}
  .muted{color:var(--muted)}
  .empty{color:var(--muted);text-align:center;padding:60px 20px;border:1px dashed var(--line);border-radius:14px}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  canvas{max-height:260px}
  a{color:var(--accent)}
  /* segmented pill control (matches company dashboard) */
  .seg{display:inline-flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px}
  .seg button{all:unset;cursor:pointer;padding:8px 16px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:6px}
  .seg button:hover{color:var(--txt)}
  .seg button.active{background:var(--panel2);color:var(--txt);box-shadow:inset 0 0 0 1px var(--line)}
  .seg button .cnt{font-size:10px;color:var(--faint);font-weight:600}
  .seg button.active .cnt{color:var(--lime)}
  .segwrap{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px;overflow-x:auto}
  .mdh1{font-size:20px;margin:0 0 4px}
  code{background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px}
  .card p{margin:6px 0}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">🎵</div><div><b>Musti</b><small>Command Center</small></div></div>
    <nav class="nav" id="nav">
      <button data-tab="who" class="active"><span class="dot"></span><span>Who You Are</span></button>
      <button data-tab="portfolio"><span class="dot"></span><span>Portfolio</span></button>
      <button data-tab="networking"><span class="dot"></span><span>Networking</span></button>
      <button data-tab="knowledge"><span class="dot"></span><span>Knowledge</span></button>
      <button data-tab="settings"><span class="dot"></span><span>Settings</span></button>
    </nav>
    <div class="spacer"></div>
    <div class="user"><div class="av">D</div><div class="meta"><b>Dave</b><small class="muted">Owner</small></div>
      <button onclick="logout()" title="Keluar" style="all:unset;cursor:pointer;margin-left:auto;color:var(--muted);font-size:12px;padding:6px 8px;border-radius:7px">⎋ Keluar</button>
    </div>
  </aside>

  <main class="main">
    <div class="head">
      <div><h1 id="title">WHO YOU ARE</h1><span class="sub" id="subtitle">self profile</span></div>
      <span class="live"><span class="pulse"></span> data live</span>
    </div>
    <div id="view"></div>
  </main>
</div>

<script>
const fmt = new Intl.NumberFormat('id-ID');
const money = (n,cur='IDR') => (cur==='IDR' ? 'Rp' : cur+' ') + fmt.format(Math.round(n));
const SIGN = t => /WITHDRAW|TRANSFER_OUT|SELL|FEE/i.test(t||'') ? -1 : 1;

const DATA = {};
async function load(name){ try{ const r=await fetch(`../data/${name}.json`); return await r.json(); }catch(e){ return null; } }
async function loadText(file){ try{ const r=await fetch(`../data/${file}`); return await r.text(); }catch(e){ return ''; } }

/* ---------- API (CRUD over personal Postgres) ---------- */
async function api(path, opts){
  const r = await fetch('/api'+path, { headers:{'Content-Type':'application/json'}, ...opts });
  if(!r.ok) throw new Error(await r.text().catch(()=>r.statusText));
  return r.status===204 ? null : r.json();
}
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const escJs = s => String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
const NET_CATS = {
  business:{label:'Business',icon:'💼'}, music:{label:'Music',icon:'🎵'},
  personal:{label:'Personal',icon:'🤝'}, community:{label:'Community',icon:'⛪'},
  government:{label:'Government',icon:'🏛️'}, hitlist:{label:'Hitlist',icon:'🎯'}
};
let NET_BY_ID = {};
function buildNetworking(rows){
  NET_BY_ID = {}; rows.forEach(r=>{ NET_BY_ID[r.id]=r; });
  const order=['business','music','personal','community','government','hitlist'];
  const byCat={}; rows.forEach(r=>{ const k=r.category||'business'; (byCat[k]=byCat[k]||[]).push(r); });
  if (!byCat['hitlist']) byCat['hitlist'] = [];
  const cats=order.filter(k=>byCat[k]!==undefined).map(k=>({id:k,label:(NET_CATS[k]||{}).label||k,icon:(NET_CATS[k]||{}).icon||'',contacts:byCat[k]}));
  Object.keys(byCat).forEach(k=>{ if(!order.includes(k)) cats.push({id:k,label:k,icon:'',contacts:byCat[k]}); });
  const todayStr = new Date().toISOString().slice(0,10), fus=[];
  rows.forEach(r=>{
    if(r.next_contact && r.next_contact <= todayStr) {
      fus.push({ id:r.id, name:r.name, category:(NET_CATS[r.category]||{}).label||r.category,
        why:r.how_can_they_help||r.role||r.descr||'—',
        reason: `due ${r.next_contact} (${r.cadence||'—'})` });
    }
  });
  return {categories:cats, followUps:fus};
}
async function loadNetworking(){ try{ return buildNetworking(await api('/networking')); }catch(e){ console.error('networking load',e); return {categories:[],followUps:[]}; } }

// minimal markdown -> HTML (headings, lists, bold, paragraphs); strips frontmatter
function mdToHtml(md){
  md = (md||'').replace(/^---[\s\S]*?---\s*/,'');
  const lines = md.split('\n'); let html=''; let inList=false;
  const close=()=>{ if(inList){html+='</ul>';inList=false;} };
  for(let raw of lines){
    const l=raw.trimEnd();
    const b = s => s.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/_(.+?)_/g,'<i>$1</i>');
    if(/^#\s/.test(l)){close();html+=`<h2 class="mdh1">${b(l.slice(2))}</h2>`;}
    else if(/^##\s/.test(l)){close();html+=`<h3 class="sec" style="margin-top:18px">${b(l.slice(3))}</h3>`;}
    else if(/^[-*]\s/.test(l)){ if(!inList){html+='<ul class="list">';inList=true;} const item=b(l.replace(/^[-*]\s/,'')); if(item.trim())html+=`<li>${item}</li>`; }
    else if(l.trim()===''){close();}
    else {close();html+=`<p>${b(l)}</p>`;}
  }
  close(); return html;
}

let ME = { email:'', tabs:[] };
const NAMES = { 'dave@mustimusik.id':['Dave','Owner'], 'alex@mustimusik.id':['Alex','Portfolio'], 'shofi@mustimusik.id':['Shofi','Networking'] };
async function boot(){
  // Who am I + what can I see?
  try{ ME = await api('/me'); }catch(e){ location.replace('/dashboards/login.html'); return; }
  const allow = new Set(ME.tabs||[]);
  document.querySelectorAll('.nav button').forEach(b=>{ if(!allow.has(b.dataset.tab)) b.remove(); });
  // User chip
  const n = NAMES[ME.email] || [ME.email.split('@')[0], ''];
  const av=document.querySelector('.user .av'); if(av) av.textContent=(n[0]||'?')[0].toUpperCase();
  const meta=document.querySelector('.user .meta'); if(meta) meta.innerHTML='<b>'+esc(n[0])+'</b><small class="muted">'+esc(n[1])+'</small>';
  // Load only the data this role can access (avoids 403s)
  const jobs=[];
  if(allow.has('who')){ jobs.push(loadText('profile.md').then(v=>DATA.profileMd=v), load('expenses').then(v=>DATA.expenses=v), load('drip').then(v=>DATA.drip=v)); }
  if(allow.has('portfolio')){ jobs.push(load('portfolio').then(v=>DATA.portfolio=v)); }
  if(allow.has('networking')){ jobs.push(loadNetworking().then(v=>DATA.networking=v)); }
  await Promise.all(jobs);
  // First allowed tab becomes active
  const first=document.querySelector('.nav button');
  if(!first){ V().innerHTML='<div class="card">No access. Hubungi Dave.</div>'; return; }
  first.classList.add('active'); render(first.dataset.tab);
}

function logout(){
  fetch('/api/logout',{method:'POST'}).finally(()=>location.replace('/dashboards/login.html'));
}

const TITLES = {
  who:['WHO YOU ARE','self profile · goals · DRIP'],
  portfolio:['PORTFOLIO','investments · spending'],
  networking:['NETWORKING','relationships · follow-ups'], knowledge:['KNOWLEDGE','from the brain'], settings:['SETTINGS','']
};
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); render(b.dataset.tab);
});
function render(tab){
  document.getElementById('title').textContent=TITLES[tab][0];
  document.getElementById('subtitle').textContent=TITLES[tab][1];
  const head=document.querySelector('.head'); if(head) head.style.display = tab==='portfolio'?'none':'';
  document.getElementById('view').innerHTML = '';
  ({who:viewWho, portfolio:viewPortfolio, networking:viewNetworking, knowledge:viewKnowledge, settings:viewSettings}[tab])();
}
const el = h => { const d=document.createElement('div'); d.innerHTML=h.trim(); return d.firstChild; };
const V = () => document.getElementById('view');

/* ---------- WHO YOU ARE (rendered from brain markdown) ---------- */
function viewWho(){
  const html = mdToHtml(DATA.profileMd);
  V().append(el(`<div class="card">${html||'<p class="muted">who-i-am.md is empty.</p>'}
    <div class="hint muted" style="margin-top:18px;border-top:1px solid var(--line);padding-top:12px">
      Source: <code>vault/profiles/who-i-am.md</code> in the brain repo — edit there, it syncs here.</div>
  </div>`));
  // DRIP weekly review lives inside Who You Are
  V().append(el(`<h3 class="sec" style="margin:24px 0 12px">⚙️ DRIP · how I spend my time (review weekly)</h3>`));
  viewDrip();
}

/* ---------- DRIP MATRIX (weekly review) ---------- */
function viewDrip(){
  const d = DATA.drip||{}; const q = d.quadrants||{};
  const last = localStorage.getItem('dripReviewed')||'';
  const quad=(key,color)=>{ const x=q[key]||{}; return `<div class="card" style="border-color:${color}33">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <h3 class="sec" style="color:${color};margin:0">${x.label||key}</h3></div>
    <div class="hint muted" style="margin:4px 0 10px">${x.hint||''}</div>
    <ul class="list">${(x.items||[]).map(i=>`<li>${i}</li>`).join('')||'<li class="muted">— (empty)</li>'}</ul>
  </div>`; };
  // weekly review banner
  V().append(el(`<div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;border-color:#a3e63533">
    <div><b style="color:var(--lime)">Weekly DRIP review</b>
      <div class="hint muted">${last?('Last reviewed: '+last):'Not reviewed yet this week.'} — move tasks between quadrants as your work changes.</div></div>
    <button onclick="localStorage.setItem('dripReviewed', new Date().toISOString().slice(0,10)); render('who')"
      style="all:unset;cursor:pointer;background:var(--lime);color:#0d0d0d;font-weight:700;padding:9px 16px;border-radius:9px;font-size:13px">✓ Mark reviewed</button>
  </div>`));
  // axis hint
  V().append(el(`<div class="hint muted" style="margin-bottom:8px">↑ makes money &nbsp;·&nbsp; → lights you up</div>`));
  // 2x2 grid: top-left Replacement, top-right Production / bottom-left Delegation, bottom-right Investment
  V().append(el(`<div class="grid cols">
    ${quad('replacement','#fbbf24')} ${quad('production','#a3e635')}
    ${quad('delegation','#f87171')} ${quad('investment','#60a5fa')}
  </div>`));
  // energy + rhythm
  const r = d.rhythm||{};
  V().append(el(`<div class="grid cols" style="margin-top:14px">
    <div class="card"><h3 class="sec">⚡ Energizes / 🪫 Drains</h3>
      <div class="muted" style="font-size:12px;margin-bottom:4px">Energizes</div>
      <div class="chip-row">${(d.energizes||[]).map(x=>`<span class="tag" style="border-color:#a3e63555;color:var(--lime)">${x}</span>`).join('')}</div>
      <div class="muted" style="font-size:12px;margin:12px 0 4px">Drains</div>
      <div class="chip-row">${(d.drains||[]).map(x=>`<span class="tag" style="border-color:#f8717155;color:var(--red)">${x}</span>`).join('')}</div>
    </div>
    <div class="card"><h3 class="sec">⏰ Productivity rhythm</h3>
      <p><b style="color:var(--lime)">Peak:</b> ${r.peak||''}</p>
      <p><b style="color:var(--orange)">Trough:</b> ${r.trough||''}</p>
      <div class="hint muted" style="margin-top:10px">Full log lives in the brain: <code>vault/profiles/energy-patterns.md</code></div>
    </div>
  </div>`));
}

/* ---------- PORTFOLIO (your exact original app, embedded) ---------- */
function viewPortfolio(){
  V().append(el(`<iframe src="./portfolio_legacy.html"
    style="width:100%;height:calc(100vh - 130px);border:1px solid var(--line);border-radius:14px;background:var(--bg)"
    title="Portfolio"></iframe>`));
}

/* ---------- NETWORKING (category sub-tabs) ---------- */
let NET_TAB = 'followups';
function chan(c){
  const out=[];
  if(c.wa) out.push('WA: '+c.wa);
  if(c.ig) out.push('IG: '+c.ig.replace(/^IG:?\s*/i,''));
  return out.join(' · ');
}
function viewNetworking(){
  const n = DATA.networking||{};
  const cats = n.categories||[]; const fus = n.followUps||[];
  if(!cats.length){ V().append(el('<div class="empty">No contacts yet. Add them in <b>networking.json</b>.</div>')); return; }
  const total = cats.reduce((s,c)=>s+c.contacts.length,0);

  // segmented pill control: Follow-ups + one per category
  const segBtn = (id,label,cnt,active)=>`<button data-net="${id}" class="${active?'active':''}">${label}<span class="cnt">${cnt}</span></button>`;
  let segs = segBtn('followups','🔔 Follow-ups',fus.length, NET_TAB==='followups');
  segs += cats.map(c=>segBtn(c.id, `${c.icon||''} ${c.label}`, c.contacts.length, NET_TAB===c.id)).join('');
  V().append(el(`<div class="segwrap"><div class="seg">${segs}</div>
    <span class="muted" style="font-size:12px;margin-left:auto">${total} contacts · <code>live DB</code></span></div>`));
  V().querySelector('.seg').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b)return; NET_TAB=b.dataset.net; render('networking');
  });

  if(NET_TAB==='followups'){ renderFollowups(fus); return; }
  const cat = cats.find(c=>c.id===NET_TAB) || cats[0];
  renderCategory(cat);
}
function renderFollowups(fus){
  if(!fus.length){ V().append(el('<div class="empty">No follow-ups flagged. Set a follow-up cadence (How Close?) to get reminders.</div>')); return; }
  V().append(el(`<div class="card" style="border-color:#a3e63533">
    <h3 class="sec" style="color:var(--lime)">People to reconnect with — based on How Close? (cadence)</h3>
    <table><thead><tr><th>Name</th><th>Category</th><th>Why reach out</th><th>Status</th><th style="text-align:right">Actions</th></tr></thead><tbody>
    ${fus.map(f=>`<tr>
      <td><b>${esc(f.name)}</b></td>
      <td class="muted">${esc(f.category||'')}</td>
      <td class="muted">${esc(f.why||'—')}</td>
      <td><span class="pill" style="background:#a3e63522;color:var(--lime)">${esc(f.reason||'follow up')}</span></td>
      <td style="white-space:nowrap;text-align:right">
        <button class="btn-icon" title="Edit" onclick="openContactModal(NET_BY_ID[${f.id}])">✏️</button>
        <button class="btn-icon" title="Hapus" onclick="deleteContact(${f.id},'${escJs(f.name)}')">🗑️</button>
      </td>
    </tr>`).join('')}
    </tbody></table></div>`));
}
function renderCategory(cat){
  const arr=cat.contacts;
  const todayStr = new Date().toISOString().slice(0,10);
  const overdue=arr.filter(c=>c.next_contact && c.next_contact <= todayStr).length;
  V().append(el(`<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px">
    <div class="grid kpis" style="flex:1;margin:0">
      <div class="card kpi"><div class="label">${cat.label}</div><div class="val" style="color:var(--accent)">${arr.length}</div><div class="hint">contacts</div></div>
      <div class="card kpi"><div class="label">Due Follow-up</div><div class="val" style="color:var(--lime)">${overdue}</div><div class="hint">need follow-up</div></div>
    </div>
    <button class="btn-primary" onclick="openContactModal(null)">+ Tambah Kontak</button>
  </div>`));
  if(!arr.length){ V().append(el(`<div class="empty">Belum ada kontak di ${cat.label}. Klik "+ Tambah Kontak".</div>`)); return; }
  V().append(el(`<div class="card"><table><thead><tr><th>Name</th><th>Role</th><th>Value</th><th>Channel</th><th>Desc</th><th>Birthday</th><th>Schedule</th><th>Notes</th><th style="text-align:right">Actions</th></tr></thead><tbody>
    ${arr.map(c=>`<tr>
      <td>
        <b>${esc(c.name)}</b>
        ${c.location?`<div class="muted" style="font-size:11px">📍 ${esc(c.location)}</div>`:''}
      </td>
      <td class="muted">${esc(c.role)||'—'}</td>
      <td class="muted" style="font-size:12px">
        ${c.how_can_i_help?`<div><span style="color:var(--lime)">I can help:</span> ${esc(c.how_can_i_help)}</div>`:''}
        ${c.how_can_they_help?`<div><span style="color:var(--accent)">They can help:</span> ${esc(c.how_can_they_help)}</div>`:''}
        ${(!c.how_can_i_help && !c.how_can_they_help)?'—':''}
      </td>
      <td class="muted" style="font-size:12px">${esc(chan(c))||'—'}</td>
      <td class="muted" style="font-size:12px">${esc(c.descr)||'—'}</td>
      <td class="muted" style="font-size:12px">${c.birthday?String(c.birthday).slice(0,10):'—'}</td>
      <td class="muted" style="font-size:12px">
        <div><b>Last:</b> ${c.last_contact?esc(c.last_contact).slice(0,10):'—'}</div>
        <div><b>Next:</b> ${c.next_contact?esc(c.next_contact).slice(0,10):'—'}</div>
        <div style="font-size:10px"><b>Cadence:</b> ${esc(c.cadence||'Kalau ada waktu')}</div>
      </td>
      <td class="muted" style="font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.notes||'')}">${esc(c.notes)||'—'}</td>
      <td style="white-space:nowrap;text-align:right">
        <button class="btn-icon" title="Edit" onclick="openContactModal(NET_BY_ID[${c.id}])">✏️</button>
        <button class="btn-icon" title="Hapus" onclick="deleteContact(${c.id},'${escJs(c.name)}')">🗑️</button>
      </td>
    </tr>`).join('')}
    </tbody></table></div>`));
}

/* ---------- NETWORKING CRUD (modal form) ---------- */
const CONTACT_FIELDS = [
  ['name','Nama','text',true],
  ['category','Kategori','select',true],
  ['role','Role','text',true],
  ['location','Lokasi','text',true],
  ['wa','WhatsApp','text',true],
  ['ig','Instagram','text',true],
  ['birthday','Birthday','date',true],
  ['cadence','How Close? (Cadence)','select_cadence',true],
  ['last_contact','Last contact','date',true],
  ['how_can_i_help','How can I help?','textarea',true],
  ['how_can_they_help','How can they help?','textarea',true],
  ['descr','Desc','textarea',true],
  ['notes','Notes','textarea',true]
];
function fieldInput(f,val){
  const [k,label,type,required]=f; const v=val==null?'':val;
  const reqAttr = required ? 'required' : '';
  if(type==='select'){
    const opts=Object.keys(NET_CATS).map(c=>`<option value="${c}" ${v===c?'selected':''}>${NET_CATS[c].label}</option>`).join('');
    return `<label class="fld"><span>${label} *</span><select name="${k}" ${reqAttr}>${opts}</select></label>`;
  }
  if(type==='select_cadence'){
    const cadences = ["Setiap minggu", "Setiap bulan", "Setiap 3... bulan", "Setiap 6 bulan", "Setiap tahun", "Kalau ada waktu"]; // wait, let's write exact cadences
    const exactCadences = ["Setiap minggu", "Setiap bulan", "Setiap 3 bulan", "Setiap 6 bulan", "Setiap tahun", "Kalau ada waktu"];
    const opts=exactCadences.map(c=>`<option value="${c}" ${v===c?'selected':''}>${c}</option>`).join('');
    return `<label class="fld"><span>${label} *</span><select name="${k}" ${reqAttr}>${opts}</select></label>`;
  }
  if(type==='textarea'){
    return `<label class="fld fld-full"><span>${label} *</span><textarea name="${k}" ${reqAttr} rows="2">${esc(v)}</textarea></label>`;
  }
  const dv = type==='date' ? String(v).slice(0,10) : esc(v);
  if(k==='last_contact'){
    return `<label class="fld">
      <span style="display:flex;justify-content:space-between;align-items:center">
        <span>${label} *</span>
        <a href="#" onclick="event.preventDefault(); document.querySelector('[name=last_contact]').value=new Date().toISOString().slice(0,10)" style="color:var(--lime);text-decoration:none;font-size:9px;font-weight:bold">✓ Set Today</a>
      </span>
      <input type="${type}" name="${k}" value="${dv}" ${reqAttr}>
    </label>`;
  }
  return `<label class="fld"><span>${label} *</span><input type="${type}" name="${k}" value="${dv}" ${reqAttr}></label>`;
}
function openContactModal(contact){
  const editing = contact && contact.id;
  document.getElementById('modalTitle').textContent = editing?'Edit Kontak':'Tambah Kontak';
  document.getElementById('modalBody').innerHTML =
    '<form id="contactForm" class="form-grid">'
    + CONTACT_FIELDS.map(f=>{
        let def = '';
        if (f[0] === 'category') {
          def = (NET_TAB !== 'followups' ? NET_TAB : 'business');
        } else if (f[0] === 'cadence') {
          def = 'Kalau ada waktu';
        } else if (f[0] === 'last_contact' && !editing) {
          def = new Date().toISOString().slice(0,10);
        }
        return fieldInput(f, contact ? contact[f[0]] : def);
      }).join('')
    + '</form>';
  document.getElementById('modalSave').onclick = ()=>saveContact(editing?contact.id:null);
  document.getElementById('modal').style.display='flex';
}
function formData(){
  const fd={};
  document.querySelectorAll('#contactForm [name]').forEach(i=>{ fd[i.name] = i.type==='checkbox'? i.checked : (i.value===''?null:i.value); });
  return fd;
}
async function saveContact(id){
  const form = document.getElementById('contactForm');
  if(!form.reportValidity()) return;
  const body=formData();
  try{
    await api('/networking'+(id?'/'+id:''), { method:id?'PUT':'POST', body:JSON.stringify(body) });
    closeModal(); DATA.networking=await loadNetworking(); render('networking');
  }catch(e){ alert('Gagal simpan: '+e.message); }
}
async function deleteContact(id,name){
  if(!confirm('Hapus kontak "'+name+'"?')) return;
  try{ await api('/networking/'+id,{method:'DELETE'}); DATA.networking=await loadNetworking(); render('networking'); }
  catch(e){ alert('Gagal hapus: '+e.message); }
}
function closeModal(){ document.getElementById('modal').style.display='none'; }

  V().append(el(`<div class="card">

    <p>This tab will outline your <b>PersonalBrain</b> (gbrain) — notes, profiles, and precedents — read-only.</p>

}
